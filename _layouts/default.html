<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | absolute_url }}">
  {% seo %}
</head>
<body>
  <div class="layout">
    <header class="site-header">
      <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
      <nav class="nav">
        <a href="{{ '/' | relative_url }}">首页</a>
      </nav>
    </header>
    <main class="main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. 使用 Jekyll 构建。</p>
    </footer>
  </div>
</body>
</html>
